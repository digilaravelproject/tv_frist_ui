<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Weather</title>
    

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/weather.css">
    <script src="../js/bridge.js" defer></script>
    <script src="../js/core/tv-core.js" defer></script>
    <script src="../js/core/tv-navigation.js" defer></script>
    <script src="../js/weather.js" defer></script>
</head>
<body>

    <div class="top-row">
        <div class="left-branding">
            <h1 class="city" id="city-name">MUMBAI</h1>
            <div class="time-date" id="live-clock">LOADING...</div>
            <div class="figure-large" id="cur-temp">--°C</div>
            <div class="aqi-label" id="aqi-text">AQI: --</div>
            <div class="figure-large" id="cur-aqi">--</div>
        </div>

        <div class="hero-rect">
            <div class="item"><div class="param-name" id="label-feels">Feels Like</div><div class="param-value" id="h-feels">--°C</div></div>
            <div class="item"><div class="param-name" id="label-humidity">Humidity</div><div class="param-value" id="h-hum">--%</div></div>
            <div class="item"><div class="param-name" id="label-pressure">Pressure</div><div class="param-value" id="h-press">-- MB</div></div>
            <div class="item"><div class="param-name" id="label-wind">Wind</div><div class="param-value" id="h-wind">-- KM/H</div></div>
            <div class="item"><div class="param-name" id="label-sunrise">Sunrise</div><div class="param-value" id="h-rise">--:-- AM</div></div>
            <div class="item"><div class="param-name" id="label-sunset">Sunset</div><div class="param-value" id="h-set">--:-- PM</div></div>
        </div>
    </div>

    <div class="spacer"></div>
    <div class="forecast-row" id="forecast-row"></div>

<script>
    // Initialize the weather module
    window.onload = function() {
        if (window.WeatherModule) {
            window.WeatherModule.init();
        }
    };
</script>
</body>
</html>
