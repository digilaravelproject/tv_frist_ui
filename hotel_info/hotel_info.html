<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hotel Info</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/hotel_info.css">
    <script src="../js/bridge.js" defer></script>
    <script src="../js/core/tv-core.js" defer></script>
    <script src="../js/core/tv-navigation.js" defer></script>
    <script src="../js/pages/hotel_info.js" defer></script>
    
</head>

<body>
    <div id="bg-slider">
        <div class="slide active"></div>
        <div class="slide"></div>
    </div>
    <div id="headerTitle">Hotel Information</div>

    <div class="content-box">
        <div class="slider-container">
            <img src="" id="displayImage" class="slide-img" tabindex="0">
            <img src="../images/icons/prev.png" class="nav-icon prev" id="btnPrev" onclick="changeSlide(-1)">
            <img src="../images/icons/next.png" class="nav-icon next" id="btnNext" onclick="changeSlide(1)">
        </div>
        
        <div class="details-container">
            <div id="hotelName" class="hotel-title">Hotel Name</div>
            <div id="hotelLocation" class="hotel-sub">Location</div>
            <div id="hotelDescription" class="hotel-desc">Loading details...</div>
            <div class="hotel-contact">
                <div id="hotelPhone">Phone: Loading...</div>
                <div id="hotelEmail">Email: Loading...</div>
            </div>
        </div>
    </div>

    
</body>

</html>
