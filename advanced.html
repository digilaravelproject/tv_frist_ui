<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Configuration</title>
    <!-- GLOBAL CSS -->
    <link rel="stylesheet" href="css/global.css">
    <!-- PAGE CSS -->
    <link rel="stylesheet" href="css/pages/advanced.css">

    <!-- CORE JS -->
    <script src="js/bridge.js" defer></script>
    <script src="js/core/tv-core.js" defer></script>
    <script src="js/core/tv-navigation.js" defer></script>
    
    <!-- PAGE JS -->
    <script src="js/pages/advanced.js" defer></script>
</head>
<body class="page-centered">

<div id="bg-slider">
    <div class="slide active"></div>
    <div class="slide"></div>
</div>

<div id="packageOverlay" class="overlay-container" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:99999; justify-content:center; align-items:center;">
    <div class="package-box" id="packageBox">
        <div id="pkgHeader" style="color:var(--house-gold); text-align:center; padding: 10px; font-size: 0.8rem;">CHOOSE IPTV PACKAGE</div>
    </div>
</div>

<div id="appOverlay" class="overlay-container" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:99999; justify-content:center; align-items:center;">
    <div class="package-box" id="appBox">
        <div id="appHeader" style="color:var(--house-gold); text-align:center; padding: 10px; font-size: 0.8rem;">CHOOSE TV APPLICATION</div>
    </div>
</div>

<div id="hdmiOverlay" class="overlay-container" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:99999; justify-content:center; align-items:center;">
    <div class="package-box hdmi-box">
        <div id="hdmiHeader" style="color:var(--house-gold); text-align:center; padding: 10px; font-size: 0.9rem; border-bottom: 2px solid var(--house-gold);">SELECT TV MODEL</div>
        <div id="hdmiBox"></div> 
    </div>
</div>

<div class="config-card">
    <div class="header-title">Advanced Configuration</div>
    <div class="main-layout">
        <div class="left-col">
            <div class="field-box">
                <label>ROOM NUMBER</label>
                <input type="text" id="roomNum" class="input-styled" maxlength="3" readonly placeholder="---">
            </div>
            <div class="field-box">
                <label>LIVE TV INPUT</label>
                <div class="themed-list">
                    <div class="list-item" tabindex="0" id="btn-iptv" onclick="openIptvMenu()">IPTV <span class="tick">✔</span></div>
                    <div class="list-item" tabindex="0" id="btn-tvapp" onclick="openAppMenu()">TV APP <span class="tick">✔</span></div>
                    <div class="list-item" tabindex="0" id="btn-hdmi" onclick="openHdmiPort()">HDMI <span class="tick">✔</span></div>
                </div>
            </div>
            <div class="field-box">
                <label>HARDWARE DETAILS</label>
                <div class="hw-info">
                    <div class="hw-sub-col">
                        <div class="hw-row"><span class="label-hw">Serial:</span> <span id="v-serial">...</span></div>
                        <div class="hw-row"><span class="label-hw">IP:</span> <span id="v-ip">...</span></div>
                        <div class="hw-row"><span class="label-hw">Gway:</span> <span id="v-gateway">...</span></div>
                        <div class="hw-row"><span class="label-hw">Model:</span> <span id="v-model">...</span></div>
                    </div>
                    <div class="hw-sub-col">
                        <div class="hw-row"><span class="label-hw">MAC:</span> <span id="v-mac">...</span></div>
                        <div class="hw-row"><span class="label-hw">Sub:</span> <span id="v-subnet">...</span></div>
                        <div class="hw-row"><span class="label-hw">DNS:</span> <span id="v-dns">...</span></div>
                        <div class="hw-row"><span class="label-hw">Andrd:</span> <span id="v-android">...</span></div>
                        <div class="hw-row"><span class="label-hw">Ver:</span> <span id="v-version">...</span></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="right-col">
            <div class="num-grid">
                <button class="key-btn" id="key1" data-val="1">1</button><button class="key-btn" data-val="2">2</button><button class="key-btn" data-val="3">3</button>
                <button class="key-btn" data-val="4">4</button><button class="key-btn" data-val="5">5</button><button class="key-btn" data-val="6">6</button>
                <button class="key-btn" data-val="7">7</button><button class="key-btn" data-val="8">8</button><button class="key-btn" data-val="DEL">⌫</button>
                <button class="key-btn" data-val="9">9</button><button class="key-btn" data-val="0">0</button><button class="key-btn" id="btn-esc">ESC</button>
            </div>
            <div class="side-btn-stack">
                <button class="side-btn" id="androidBtn">Android Settings</button>
                <button class="side-btn" id="refreshBtn" onclick="loadHW()">Refresh Details</button>
            </div>
        </div>
    </div>
    <div class="action-row">
        <button class="btn-act" id="saveBtn">Save Configuration</button>
        <button class="btn-act" id="exitBtn">Exit</button>
    </div>
</div>

</body>
</html>
