<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Language</title>
    <!-- GLOBAL CSS -->
    <link rel="stylesheet" href="css/global.css">
    <!-- PAGE CSS -->
    <link rel="stylesheet" href="css/pages/languages.css">

    <!-- CORE JS -->
    <script src="js/bridge.js"></script>
    <script src="js/core/tv-core.js"></script>
    <script src="js/core/tv-navigation.js"></script>
    
    <!-- PAGE JS -->
    <script src="js/pages/languages.js"></script>

    <script>
        (function () {
            const time = Date.now();
            // Load bridge first
            const bridgeJs = document.createElement('script');
            bridgeJs.src = 'js/bridge.js?v=' + time;
            bridgeJs.defer = true;
            document.head.appendChild(bridgeJs);
        })();
    </script>
</head>
<body class="page-centered">
    <div id="bg-slider">
        <div class="slide active"></div>
        <div class="slide"></div>
    </div>

    <div class="lang-card">
        <div class="header-title" id="titleText">Select Language</div>

        <div class="lang-list" id="langList"></div>

        <div class="controls">
            <button class="btn" id="applyBtn">Apply</button>
            <button class="btn" id="cancelBtn">Cancel</button>
        </div>
    </div>
</body>
</html>
